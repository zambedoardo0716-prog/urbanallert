<!doctype html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UrbanAlert</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--accent:#0071e3;--ok:#34c759;--warn:#ff9f0a;--danger:#ff3b30}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text)}.app{max-width:1200px;margin:auto;padding:16px}.card{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)}input,select,textarea,button{width:100%;padding:10px;border-radius:12px;border:1px solid #ddd;font-size:14px}button{background:var(--accent);color:#fff;border:0;cursor:pointer}button.secondary{background:#e8e8ed;color:#1d1d1f}.row{display:grid;gap:12px;grid-template-columns:1fr}.hidden{display:none!important}.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}#map{height:55vh;border-radius:16px}.fab{position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;z-index:1000}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{padding:12px;border-radius:14px;background:#f2f2f7;cursor:pointer}.list{display:grid;gap:8px;margin-top:10px}.item{background:#fff;padding:10px;border-radius:12px}.msg{padding:10px;border-radius:10px;background:#fff3cd}.error{background:#ffe5e5}.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;z-index:2000}.sheet{background:#fff;width:100%;padding:16px;border-radius:18px 18px 0 0;max-height:80vh;overflow:auto}@media(min-width:900px){.row{grid-template-columns:1fr 1fr}.sheet{max-width:520px;margin:auto;border-radius:18px}}</style></head><body><div id="fatal" class="app hidden"><div class="card msg error">Si è verificato un errore. Ricarica la pagina.</div></div><div id="root" class="app"></div><script>
const DB={get:(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d)),set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};
const state={user:DB.get('ua_user',null),users:DB.get('ua_users',[]),reports:DB.get('ua_reports',[]),confirmations:DB.get('ua_confirmations',[]),view:'all',map:null,markers:[],boundary:null};
const cats=['buca','rifiuti','illuminazione','segnaletica','acqua','verde pubblico','calamità naturale','altro'];
const sts=['In attesa','Presa in carico','In lavorazione','Risolta'];
function safe(fn){try{return fn()}catch(e){console.error(e);toast('Errore imprevisto','error')}}
window.onerror=()=>{document.getElementById('root').classList.add('hidden');document.getElementById('fatal').classList.remove('hidden')};window.onunhandledrejection=window.onerror;
function toast(t,kind='ok'){const d=document.createElement('div');d.className='msg '+(kind==='error'?'error':'');d.textContent=t;d.style.position='fixed';d.style.top='10px';d.style.right='10px';d.style.zIndex=4000;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}
function save(){DB.set('ua_user',state.user);DB.set('ua_users',state.users);DB.set('ua_reports',state.reports);DB.set('ua_confirmations',state.confirmations)}
function el(){const r=document.getElementById('root');if(!state.user){r.innerHTML=`<div class='card'><h2>UrbanAlert</h2><div class='row'><input id='u' placeholder='Nome utente'><select id='role'><option>cittadino</option><option>operatore comunale</option></select><input id='city' placeholder='Comune di residenza'><input id='op' class='hidden' placeholder='Password operatore' type='password'></div><button id='login'>Accedi / Registrati</button></div>`;document.getElementById('role').onchange=e=>document.getElementById('op').classList.toggle('hidden',e.target.value!=='operatore comunale');document.getElementById('login').onclick=()=>safe(login);return}
 r.innerHTML=`<div class='topbar'><div><b>${state.user.username}</b> · ${state.user.role}</div><button id='logout' class='secondary' style='width:auto'>Logout</button></div>${state.user.role==='operatore comunale'?dashboardTpl():''}<div class='card'><div id='map'></div></div><button class='fab' id='recenter'>◎</button><div class='card' style='margin-top:10px'><h3>Le mie segnalazioni</h3><div class='list'>${myReports().map(reportTpl).join('')||'Nessuna'}</div></div>`;document.getElementById('logout').onclick=()=>{state.user=null;save();el()};document.getElementById('recenter').onclick=()=>safe(()=>centerGps(true));bindDashboard();initMap();}
function login(){const username=u.value.trim(),role=role.value,city=city.value.trim(),op=op.value; if(!username||!city)return toast('Compila tutti i campi','error'); if(role==='operatore comunale'&&op!=='Giorgio24')return toast('Password operatore errata','error'); state.user={id:crypto.randomUUID(),username,role,city}; state.users.push(state.user); save(); el();}
function dashboardTpl(){const own=state.reports.filter(x=>x.municipality===state.user.city);const c={attesa:own.filter(x=>x.status==='In attesa').length,work:own.filter(x=>x.status==='In lavorazione').length,res:own.filter(x=>x.status==='Risolta').length,crit:own.filter(x=>x.priority===5).length};return `<div class='grid4'>${[['attesa','In attesa',c.attesa],['work','In lavorazione',c.work],['res','Risolte',c.res],['crit','Critiche',c.crit]].map(s=>`<div class='stat' data-v='${s[0]}'><small>${s[1]}</small><h3>${s[2]}</h3></div>`).join('')}</div><div id='dashList' class='card' style='margin:10px 0'></div>`}
function bindDashboard(){document.querySelectorAll('.stat').forEach(s=>s.onclick=()=>{state.view=s.dataset.v;renderDashList()});renderDashList()}
function renderDashList(){const box=document.getElementById('dashList');if(!box)return;let arr=state.reports.filter(x=>x.municipality===state.user.city);if(state.view==='attesa')arr=arr.filter(x=>x.status==='In attesa').sort((a,b)=>b.confirms-a.confirms);if(state.view==='work')arr=arr.filter(x=>x.status==='In lavorazione');if(state.view==='res')arr=arr.filter(x=>x.status==='Risolta');if(state.view==='crit')arr=arr.filter(x=>x.priority===5);box.innerHTML='<h3>Segnalazioni</h3><div class=list>'+arr.map(reportTpl).join('')+'</div>';document.querySelectorAll('[data-open]').forEach(n=>n.onclick=()=>openReport(n.dataset.open))}
function reportTpl(r){return `<div class='item'><b>${r.category}</b> · ${r.status} · Priorità ${r.priority||'-'}<br><small>${r.municipality} · ${new Date(r.createdAt).toLocaleString()} · Conferme ${r.confirms} · ${r.author}</small><button data-open='${r.id}' style='margin-top:8px'>Apri</button></div>`}
function myReports(){return state.reports.filter(r=>r.authorId===state.user.id)}
async function initMap(){if(state.map)state.map.remove();state.map=L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(state.map);await centerGps();if(state.user.role==='operatore comunale')drawBoundary();renderReportsOnMap();enableLongPress();}
async function centerGps(force){return new Promise(res=>navigator.geolocation.getCurrentPosition(p=>{state.map.setView([p.coords.latitude,p.coords.longitude],16);if(force)toast('Posizione aggiornata');res()},()=>{state.map.setView([41.9,12.5],6);toast('GPS non disponibile','error');res()},{enableHighAccuracy:true}))}
async function reverse(lat,lng){const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);const j=await r.json();return j.address?.city||j.address?.town||j.address?.village||'Sconosciuto'}
async function drawBoundary(){try{const q=encodeURIComponent(state.user.city);const r=await fetch(`https://nominatim.openstreetmap.org/search?city=${q}&format=json&polygon_geojson=1&limit=1`);const j=await r.json();if(j[0]?.geojson){state.boundary=L.geoJSON(j[0].geojson,{style:{color:'#0071e3',weight:3,fill:false}}).addTo(state.map);state.map.fitBounds(state.boundary.getBounds())}}catch{toast('Confine comunale non disponibile','error')}}
function visibleReports(){let arr=state.reports.filter(r=>r.status!=='Risolta');if(state.user.role==='cittadino')arr=arr.filter(r=>r.municipality===state.user.city);if(state.user.role==='operatore comunale')arr=state.reports.filter(r=>r.municipality===state.user.city);return arr}
function renderReportsOnMap(){state.markers.forEach(m=>m.remove());state.markers=[];visibleReports().forEach(r=>{const m=L.marker([r.lat,r.lng]).addTo(state.map).bindPopup(`<b>${r.category}</b><br>${r.status}<br>Priorità ${r.priority||'-'}<br>Conferme ${r.confirms}<br><button onclick='openReport("${r.id}")'>Apri</button>`);state.markers.push(m)})}
function enableLongPress(){let t=null,latlng=null;const start=e=>{latlng=e.latlng;t=setTimeout(()=>openCreate(latlng),550)};const cancel=()=>{if(t)clearTimeout(t)};state.map.on('mousedown',start);state.map.on('touchstart',start);state.map.on('mouseup',cancel);state.map.on('touchend',cancel);state.map.on('move',cancel)}
async function openCreate(ll){const mun=await reverse(ll.lat,ll.lng);const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class='sheet'><h3>Nuova segnalazione</h3><select id='cat'>${cats.map(c=>`<option>${c}</option>`)}</select><textarea id='desc' placeholder='Descrizione opzionale'></textarea><input id='pic' type='file' accept='image/*'><button id='send'>Invia segnalazione</button><button id='x' class='secondary'>Chiudi</button></div>`;document.body.appendChild(m);m.querySelector('#x').onclick=()=>m.remove();m.querySelector('#send').onclick=async()=>{const f=pic.files[0];let photo='';if(f)photo=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)});state.reports.push({id:crypto.randomUUID(),lat:ll.lat,lng:ll.lng,category:cat.value,description:desc.value,photo,createdAt:new Date().toISOString(),author:state.user.username,authorId:state.user.id,municipality:mun,status:'In attesa',priority:null,confirms:0});save();m.remove();el();toast('Segnalazione inviata')}}
window.openReport=function(id){safe(()=>{const r=state.reports.find(x=>x.id===id);if(!r)return toast('Segnalazione non trovata','error');const m=document.createElement('div');m.className='modal';m.innerHTML=`<div class='sheet'><h3>${r.category}</h3><p>${r.description||'Nessuna descrizione'}</p><p>${r.municipality} · ${new Date(r.createdAt).toLocaleString()}</p><p>Stato: ${r.status} · Priorità: ${r.priority||'-'} · Conferme: ${r.confirms}</p>${r.photo?`<img src='${r.photo}' style='width:100%;border-radius:12px'>`:''}${state.user.role==='cittadino'?"<button id='cf'>👍 Conferma problema</button>":''}${state.user.role==='operatore comunale'?`<select id='st'>${sts.map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`)}</select><select id='pr'><option value=''>Priorità</option>${[1,2,3,4,5].map(p=>`<option ${p===r.priority?'selected':''}>${p}</option>`)}</select><button id='sv'>Salva</button>`:''}<button id='cl' class='secondary'>Chiudi</button></div>`;document.body.appendChild(m);m.querySelector('#cl').onclick=()=>m.remove();if(m.querySelector('#cf'))m.querySelector('#cf').onclick=()=>{const k=state.user.id+'_'+r.id;if(state.confirmations.includes(k))return toast('Hai già confermato','error');state.confirmations.push(k);r.confirms++;save();m.remove();el()};if(m.querySelector('#sv'))m.querySelector('#sv').onclick=()=>{r.status=m.querySelector('#st').value;r.priority=Number(m.querySelector('#pr').value)||null;save();if(r.status==='Risolta')toast('La tua segnalazione è stata risolta dal comune.');m.remove();el()}})}
el();
</script></body></html>
